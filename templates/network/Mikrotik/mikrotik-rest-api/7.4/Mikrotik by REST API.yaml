zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 36bff6c29af64692839d077febfc7079
      name: 'Templates/Network devices'
  templates:
    - uuid: 4d95fa18d3d548e4afa2aeccedd8689a
      template: 'Mikrotik by REST API'
      name: 'Mikrotik by REST API'
      groups:
        - name: 'Templates/Network devices'
      items:
        - uuid: e92a908dadee4ef3a3e184369dc4daa0
          name: 'ICMP loss'
          type: SIMPLE
          key: 'icmppingloss[{$REST_API_HOST},10]'
          value_type: FLOAT
          units: '%'
          description: 'The percentage of lost packets.'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
        - uuid: 870c606bec194d1ab86f20cecc1f8927
          name: 'ICMP response time'
          type: SIMPLE
          key: 'icmppingsec[{$REST_API_HOST}]'
          value_type: FLOAT
          description: 'The ICMP ping response time (in seconds).'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
        - uuid: 049c652484684a899666e8a8fcb12fb4
          name: 'ICMP ping'
          type: SIMPLE
          key: 'icmpping[{$REST_API_HOST}]'
          description: |
            The host accessibility by ICMP ping.
            
            0 - ICMP ping fails;
            1 - ICMP ping successful.
          valuemap:
            name: 'Service state'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
        - uuid: 7bf47fbba08b46abbc578e3bb45e92ab
          name: 'Mikrotik: REST API interface'
          type: HTTP_AGENT
          key: interface
          delay: 10s
          value_type: TEXT
          authtype: BASIC
          username: '{$REST_API_USER}'
          password: '{$REST_API_PASSWORD}'
          url: '{$REST_API_PROTOCOL}://{$REST_API_HOST}:{$REST_API_PORT}/rest/interface/print'
          post_type: JSON
          posts: |
            {
                ".proplist" : ".id,name,running,tx-byte,rx-byte,type"
            }
          request_method: POST
          tags:
            - tag: component
              value: json
        - uuid: 22bdc9205edc407e92a9dd11f68e13c3
          name: 'Mikrotik: REST API interface ethernet'
          type: HTTP_AGENT
          key: interface.ethernet
          value_type: TEXT
          authtype: BASIC
          username: '{$REST_API_USER}'
          password: '{$REST_API_PASSWORD}'
          url: '{$REST_API_PROTOCOL}://{$REST_API_HOST}:{$REST_API_PORT}/rest/interface/ethernet/print'
          post_type: JSON
          posts: |
            {
                ".query":["running=true"]
            }
          request_method: POST
          tags:
            - tag: component
              value: json
        - uuid: b127e666416c41eb9b40ec8a6c8d1364
          name: 'Mikrotik: REST API interface ethernet sfp'
          type: HTTP_AGENT
          key: interface.ethernet.sfp
          delay: 15m
          value_type: TEXT
          authtype: BASIC
          username: '{$REST_API_USER}'
          password: '{$REST_API_PASSWORD}'
          url: '{$REST_API_PROTOCOL}://{$REST_API_HOST}:{$REST_API_PORT}/rest/interface/ethernet/print'
          post_type: JSON
          posts: |
            {
                ".query":["running=true"],
                ".proplist" : ".id,default-name,name"
            }
          request_method: POST
          tags:
            - tag: component
              value: json
        - uuid: ea687099353c4f8bb66d8d03b61081c1
          name: 'Mikrotik: REST API routing BGP session'
          type: HTTP_AGENT
          key: routing.bgp.session
          delay: 30s
          value_type: TEXT
          authtype: BASIC
          username: '{$REST_API_USER}'
          password: '{$REST_API_PASSWORD}'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value);
                  
                  
                  //data.forEach(function(item) {
                  //  if (!('established' in item)) {
                  //    item.established = false; 
                  //  }
                  //});
                  
                  return JSON.stringify(data);
          url: '{$REST_API_PROTOCOL}://{$REST_API_HOST}:{$REST_API_PORT}/rest/routing/bgp/session'
          tags:
            - tag: component
              value: json
        - uuid: 17bb5ad9450345fcb7809bcd729a3062
          name: 'Mikrotik: REST API routing BGP session list'
          type: DEPENDENT
          key: routing.bgp.session.list
          value_type: TEXT
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value);
                  
                  var list = [];
                  
                  data.forEach(function(item) {
                  	list.push(item.name);
                  });
                  
                  var sessions = {"list": list, "count": list.length};
                  
                  return JSON.stringify(sessions);
          master_item:
            key: routing.bgp.session
          tags:
            - tag: component
              value: json
          triggers:
            - uuid: 0c2729845acd4f46afc0ca0569f07b0b
              expression: 'jsonpath(last(/Mikrotik by REST API/routing.bgp.session.list,#1), "$.count") < jsonpath(last(/Mikrotik by REST API/routing.bgp.session.list,#2), "$.count")'
              recovery_mode: NONE
              name: 'BGP closed session.'
              opdata: 'Loss: {ITEM.LASTVALUE1}'
              priority: HIGH
              manual_close: 'YES'
        - uuid: 769b39a17f9c440cb83566b9f77f2f3d
          name: 'Mikrotik: REST API system identity.'
          type: HTTP_AGENT
          key: system.identity
          delay: 15m
          value_type: TEXT
          authtype: BASIC
          username: '{$REST_API_USER}'
          password: '{$REST_API_PASSWORD}'
          inventory_link: NAME
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.name
          url: '{$REST_API_PROTOCOL}://{$REST_API_HOST}:{$REST_API_PORT}/rest/system/identity'
        - uuid: f16f475e095d4ee4bb32e7aa6bc67716
          name: 'Mikrotik: REST API system resouce.'
          type: HTTP_AGENT
          key: system.resource
          value_type: TEXT
          authtype: BASIC
          username: '{$REST_API_USER}'
          password: '{$REST_API_PASSWORD}'
          url: '{$REST_API_PROTOCOL}://{$REST_API_HOST}:{$REST_API_PORT}/rest/system/resource'
        - uuid: e9ab27bb9e444ff0a944f5c4b419747c
          name: 'Mikrotik: System resouce architecture-name.'
          type: DEPENDENT
          key: system.resource.architecture-name
          value_type: TEXT
          inventory_link: HW_ARCH
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.["architecture-name"]'
          master_item:
            key: system.resource
        - uuid: d4d147bf2d844c9a9536da65f4aa9eaf
          name: 'Mikrotik: System resource board-name.'
          type: DEPENDENT
          key: system.resource.board-name
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.["board-name"]'
          master_item:
            key: system.resource
        - uuid: ef2b0fe90ba643d199ea6d4c997eef65
          name: 'Mikrotik: REST API system resouce cpu.'
          type: HTTP_AGENT
          key: system.resource.cpu
          value_type: TEXT
          authtype: BASIC
          username: '{$REST_API_USER}'
          password: '{$REST_API_PASSWORD}'
          url: '{$REST_API_PROTOCOL}://{$REST_API_HOST}:{$REST_API_PORT}/rest/system/resource/cpu'
        - uuid: 12f03188342f4b3c80787ae4345b8e53
          name: 'Mikrotik: System resource cpu-load.'
          type: DEPENDENT
          key: system.resource.cpu-load
          units: '%'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.["cpu-load"]'
          master_item:
            key: system.resource
        - uuid: 6681349b61ec46d9b5a0ebdb64d54600
          name: 'Mikrotik: System resource free-memory.'
          type: DEPENDENT
          key: system.resource.free-memory
          units: B
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.["free-memory"]'
          master_item:
            key: system.resource
        - uuid: 37c1634dda2b4722ad9b767c852c19c4
          name: 'Mikrotik: System resource memory utilization.'
          type: CALCULATED
          key: system.resource.memory-utilization
          units: '%'
          params: '(last(//system.resource.total-memory)-last(//system.resource.free-memory))*100/last(//system.resource.total-memory)'
        - uuid: 011193e39516492d8d8849a364ac2a6a
          name: 'Mikrotik: System resource platform.'
          type: DEPENDENT
          key: system.resource.platform
          value_type: TEXT
          inventory_link: VENDOR
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.platform
          master_item:
            key: system.resource
        - uuid: 4a487e401ce14de9800a2c1ff3fe2128
          name: 'Mikrotik: System resource total-memory.'
          type: DEPENDENT
          key: system.resource.total-memory
          trends: '0'
          units: B
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.["total-memory"]'
          master_item:
            key: system.resource
        - uuid: 56cbb493a71a4b7cb0e842c9a59eafbb
          name: 'Mikrotik: REST API system routerboard.'
          type: HTTP_AGENT
          key: system.routerboard
          delay: 15m
          value_type: TEXT
          authtype: BASIC
          username: '{$REST_API_USER}'
          password: '{$REST_API_PASSWORD}'
          url: '{$REST_API_PROTOCOL}://{$REST_API_HOST}:{$REST_API_PORT}/rest/system/routerboard'
        - uuid: 430ce1260c3a43688ad5ac7dc3f44f0a
          name: 'Mikrotik: System routerboard current-firmware.'
          type: DEPENDENT
          key: system.routerboard.current-firmware
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.["current-firmware"]'
          master_item:
            key: system.routerboard
        - uuid: 0d633d32eab140d188f672256b408454
          name: 'Mikrotik: System routerboard hardware.'
          type: CALCULATED
          key: system.routerboard.hardware
          delay: 15m
          value_type: TEXT
          params: 'concat(last(//system.resource.board-name), " (", last(//system.routerboard.model), ")")'
          inventory_link: HARDWARE
        - uuid: 2dfafd6984334fa9b9d15aa0e158d073
          name: 'Mikrotik: System routerboard model.'
          type: DEPENDENT
          key: system.routerboard.model
          value_type: TEXT
          inventory_link: MODEL
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.model
          master_item:
            key: system.routerboard
        - uuid: eb6cf7dfe6104ede9bcf63b108d7807b
          name: 'Mikrotik: System routerboard serial-number.'
          type: DEPENDENT
          key: system.routerboard.serial-number
          value_type: TEXT
          inventory_link: SERIALNO_A
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.["serial-number"]'
          master_item:
            key: system.routerboard
        - uuid: ae5a594e83024d89934acbab41c9b255
          name: 'Mikrotik: System routerboard upgrade-firmware.'
          type: DEPENDENT
          key: system.routerboard.upgrade-firmware
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.["upgrade-firmware"]'
          master_item:
            key: system.routerboard
        - uuid: 4a8a72b8b30d40e0a9ce1b922d51310f
          name: 'Mikrotik: ZABBIX API'
          type: HTTP_AGENT
          key: zabbix.api.item.get
          delay: 10s
          value_type: TEXT
          status: DISABLED
          url: 'http://localhost:8080/api_jsonrpc.php'
          post_type: JSON
          posts: |
            {
                "jsonrpc": "2.0",
                "method": "item.get",
                "params": {
                    "output": "extend",
                    "hostids": "10780",
                    "with_triggers": true,
                    "search": {
                        "key_": "routing.bgp.session.["
                    },
                    "sortfield": "name"
                },
                "id": 1
            }
          headers:
            - name: Authorization
              value: 'Bearer 15a47ba157acd28372abf211eb63edda457790158b0517533d4f13ac3e9eb088'
          request_method: POST
          tags:
            - tag: component
              value: json
      discovery_rules:
        - uuid: 794c8c1b21a44e60afe486fbfdd4d54a
          name: 'Interface discovery'
          type: DEPENDENT
          key: interface.discovery
          filter:
            conditions:
              - macro: '{#RUNNING}'
                value: 'true'
          item_prototypes:
            - uuid: a7c940beac5f417fbe6454965136242e
              name: 'Interface {#IFNAME} rx-byte'
              type: DEPENDENT
              key: 'interface.[{#IFNAME}.rx-byte]'
              trends: '0'
              units: bps
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.[?(@.[".id"] == "{#INDEX}")].["rx-byte"].first()'
                - type: CHANGE_PER_SECOND
                - type: MULTIPLIER
                  parameters:
                    - '8'
              master_item:
                key: interface
            - uuid: 90e2191d89254337bd4f6b87cf0ae222
              name: 'Interface {#IFNAME} tx-byte'
              type: DEPENDENT
              key: 'interface.[{#IFNAME}.tx-byte]'
              trends: '0'
              units: bps
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.[?(@.[".id"] == "{#INDEX}")].["tx-byte"].first()'
                - type: CHANGE_PER_SECOND
                - type: MULTIPLIER
                  parameters:
                    - '8'
              master_item:
                key: interface
          graph_prototypes:
            - uuid: aaf2492f17c64d628523898db0f5a883
              name: 'Interface {#IFNAME} network traffic'
              graph_items:
                - color: 1A7C11
                  calc_fnc: ALL
                  item:
                    host: 'Mikrotik by REST API'
                    key: 'interface.[{#IFNAME}.rx-byte]'
                - sortorder: '1'
                  color: FF4000
                  calc_fnc: ALL
                  item:
                    host: 'Mikrotik by REST API'
                    key: 'interface.[{#IFNAME}.tx-byte]'
          master_item:
            key: interface
          lld_macro_paths:
            - lld_macro: '{#IFNAME}'
              path: $.name
            - lld_macro: '{#IFTYPE}'
              path: $.type
            - lld_macro: '{#INDEX}'
              path: '$.[".id"]'
            - lld_macro: '{#RUNNING}'
              path: $.running
        - uuid: 9e294d1dbd0243708489c28874041d61
          name: 'Interface ethernet discovery'
          type: DEPENDENT
          key: interface.ethernet.discovery
          item_prototypes:
            - uuid: d16df08303ce4b99af1bacfe351dfe3d
