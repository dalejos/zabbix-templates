          graph_prototypes:
            - uuid: 60eff573fc754a198e9d1277f70db257
              name: 'Interface ethernet {#IFNAME} stast:'
              graph_items:
                - color: 1A7C11
                  calc_fnc: ALL
                  item:
                    host: 'Mikrotik by REST API'
                    key: 'interface.ethernet.[{#IFNAME}.rx-bytes]'
                - sortorder: '1'
                  color: '274482'
                  calc_fnc: ALL
                  item:
                    host: 'Mikrotik by REST API'
                    key: 'interface.ethernet.[{#IFNAME}.tx-bytes]'
                - sortorder: '2'
                  color: F63100
                  calc_fnc: ALL
                  item:
                    host: 'Mikrotik by REST API'
                    key: 'interface.ethernet.[{#IFNAME}.driver-rx-byte]'
                - sortorder: '3'
                  color: 2774A4
                  calc_fnc: ALL
                  item:
                    host: 'Mikrotik by REST API'
                    key: 'interface.ethernet.[{#IFNAME}.driver-tx-byte]'
                - sortorder: '4'
                  color: A54F10
                  yaxisside: RIGHT
                  calc_fnc: ALL
                  item:
                    host: 'Mikrotik by REST API'
                    key: 'interface.ethernet.[{#IFNAME}.driver-rx-packet]'
                - sortorder: '5'
                  color: FC6EA3
                  yaxisside: RIGHT
                  calc_fnc: ALL
                  item:
                    host: 'Mikrotik by REST API'
