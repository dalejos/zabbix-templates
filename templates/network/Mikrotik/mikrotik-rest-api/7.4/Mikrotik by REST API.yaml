          lld_macro_paths:
            - lld_macro: '{#IFNAME}'
              path: $.name
            - lld_macro: '{#INDEX}'
              path: '$.[".id"]'
        - uuid: 487c40c7f1ee4fb4a31f2291bab4601c
          name: 'SFP interfaces discovery'
          type: DEPENDENT
          key: interface.ethernet.sfp.discovery
          filter:
            conditions:
              - macro: '{#DEFAULTIFNAME}'
                value: sfp
          item_prototypes:
            - uuid: c2609faf4e40443abf8be8539d0d0930
              name: 'SFP module {#IFNAME} sfp-rx-power:'
              type: DEPENDENT
              key: 'interface.ethernet.sfp-module.[{#IFNAME}.sfp-rx-power]'
              value_type: FLOAT
              units: dBm
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[0].["sfp-rx-power"]'
              master_item:
                key: 'interface.ethernet.sfp-module.[{#IFNAME}]'
            - uuid: 571ea04c18424d31bef543a102f8ee06
              name: 'SFP module {#IFNAME} sfp-temperature:'
              type: DEPENDENT
              key: 'interface.ethernet.sfp-module.[{#IFNAME}.sfp-temperature]'
              value_type: FLOAT
              units: °C
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[0].["sfp-temperature"]'
              master_item:
                key: 'interface.ethernet.sfp-module.[{#IFNAME}]'
            - uuid: 76a47ea2eb5648f48a93c79cdb951fff
              name: 'SFP module {#IFNAME} sfp-tx-power:'
              type: DEPENDENT
              key: 'interface.ethernet.sfp-module.[{#IFNAME}.sfp-tx-power]'
              value_type: FLOAT
              units: dBm
              preprocessing:
                - type: JSONPATH
                  parameters:
